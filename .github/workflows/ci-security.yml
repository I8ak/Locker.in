name: CI Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Compilación: Si falla, no tiene sentido escanear
      - name: Build con Gradle
        run: ./gradlew assembleDebug
        env:
          ORG_GRADLE_PROJECT_GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}

      # 2. SAST: Análisis de código estático con Semgrep
      - name: SAST Scan (Semgrep)
        run: |
          pip install semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif
      # 3. SCA: Auditoría de dependencias con Trivy (Más rápido y moderno)
      - name: SCA Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-results.txt'
          exit-code: '0' # Cambia a '1' si quieres que el pipeline falle si encuentra vulnerabilidades
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
      # 4. Subir reportes como artefactos (para que puedas verlos luego)
      - name: Subir reportes de seguridad
        uses: actions/upload-artifact@v4
        with:
          name: reportes-seguridad
          path: |
            semgrep.sarif
            trivy-results.txt
          if-no-files-found: warn