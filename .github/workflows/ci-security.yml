name: CI Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Compilación: Si falla, no tiene sentido escanear
      - name: Build con Gradle
        run: ./gradlew assembleDebug
        env:
          ORG_GRADLE_PROJECT_GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}

      # 2. SAST: Análisis de código estático con Semgrep
      - name: SAST Scan (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/android
          generate-sarif: "true"

      # 3. SCA: Auditoría de dependencias (Corregido)
      - name: SCA Scan (Dependency-Check)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'LockerIn'
          path: '.'
          format: 'HTML'
          args: >
            --noupdate
            --disableAssembly

      # 4. Subir reportes como artefactos (para que puedas verlos luego)
      - name: Subir reportes de seguridad
        uses: actions/upload-artifact@v4
        with:
          name: reportes-seguridad
          path: |
            dependency-check-report.html
            semgrep-results.sarif